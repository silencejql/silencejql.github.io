<h2 id="关键字"><a href="#关键字" class="headerlink" title="关键字"></a>关键字</h2><p>GRANT:赋予权限<br>REVOKE:收回已经授予的权限<br>DENY:禁掉某个权限</p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">--赋予Jack用户对表student的SELECT,UPDATE,DELETE权限</span></span><br><span class="line">​<span class="keyword">GRANT</span> <span class="keyword">SELECT</span>,<span class="keyword">UPDATE</span>,<span class="keyword">DELETE</span> <span class="keyword">ON</span> <span class="keyword">TABLE</span> student <span class="keyword">TO</span> Jack</span><br><span class="line"></span><br><span class="line"><span class="comment">--收回Jack SELECT 权限</span></span><br><span class="line"><span class="keyword">REVOKE</span> <span class="keyword">SELECT</span> <span class="keyword">FROM</span> Jack</span><br><span class="line"></span><br><span class="line"><span class="comment">--拒绝Jack 的SELECT 权限</span></span><br><span class="line">DENY <span class="keyword">SELECT</span> <span class="keyword">TO</span> Jack</span><br></pre></td></tr></table></figure>

nder和birth字段</span></span><br></pre></td></tr></table></figure>
