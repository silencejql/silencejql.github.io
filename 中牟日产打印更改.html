ing">"select * from [Sheet1$] where [Code18/EI] like '%&#123;0&#125;%'"</span>, EI);</span><br><span class="line">    OleDbDataAdapter oada = <span class="keyword">new</span> OleDbDataAdapter(sql, conn);</span><br><span class="line">    oada.Fill(ds);</span><br><span class="line">    DataRow dr = <span class="literal">null</span>;</span><br><span class="line">    <span class="keyword">if</span> (ds.Tables[<span class="number">0</span>].Rows.Count &gt; <span class="number">0</span>)</span><br><span class="line">        dr = ds.Tables[<span class="number">0</span>].Rows[<span class="number">0</span>];</span><br><span class="line">    <span class="keyword">else</span></span><br><span class="line">    &#123;</span><br><span class="line">        MessageBox.Show(<span class="string">"EI车辆型号Excel中没有当前车型，请检查"</span>);</span><br><span class="line">        <span class="keyword">return</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    CarType = dr[<span class="string">"Cartype/车辆型号"</span>].ToString();</span><br><span class="line">    ProductEnterprise = dr[<span class="string">"生产企业"</span>].ToString();</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
