    <h2 id="文本设置"><a href="#文本设置" class="headerlink" title="文本设置"></a>文本设置</h2><figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">font: italic bold 36px 宋体; //顺序不可变</span><br><span class="line"><span class="selector-tag">font-wight</span>: 100<span class="selector-tag">-900</span>、<span class="selector-tag">bold</span>（加粗）</span><br><span class="line">font-size: 10px; // 	12px(12像素)、50%、larger、small</span><br><span class="line"><span class="selector-tag">font-style</span>: <span class="selector-tag">initial</span>（初始）、<span class="selector-tag">italic</span>（斜体字）、<span class="selector-tag">normal</span>（默认）、<span class="selector-tag">oblique</span>（倾斜）</span><br><span class="line">font-family: "微软雅黑" // 宋体</span><br><span class="line">text-align: center; //横向排列  left、right 和 center</span><br><span class="line">line-height: 200px; //文本行高 通俗的讲，文字高度加上文字上下的空白区域的高度 50%:基于字体大小的百分比</span><br><span class="line">vertical-align:-4px; //设置元素内容的垂直对齐方式 ,只对行内元素有效，对块级元素无效</span><br><span class="line">text-indent: 150px; //首行缩进</span><br><span class="line">letter-spacing: 10px; //字母间隙</span><br><span class="line">word-spacing: 20px; //单词间隙</span><br><span class="line">text-transform: capitalize; //单词大写</span><br></pre></td></tr></table></figure>

<h2 id="背景属性"><a href="#背景属性" class="headerlink" title="背景属性"></a>背景属性</h2><figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">background-color: cornflowerblue; //背景颜色</span><br><span class="line">background-image: url('1.jpg'); //背景图片</span><br><span class="line">background-repeat: no-repeat/repeat-x/repeat=t; //(默认铺满，不重复，x重复，y重复)</span><br><span class="line">background-size:600px 250px //大小</span><br><span class="line">background-position: right top（20px 20px）;//(横向：left center right)(纵向：top center bottom) //简写：</span><br><span class="line">&lt;body style="background: 20px 20px no-repeat #ff4 url('1.jpg')"&gt;</span><br><span class="line">&lt;div style="width: 300px;height: 300px;background: 20px 20px no-repeat #ff4 url('1.jpg')"&gt;</span><br></pre></td></tr></table></figure>
