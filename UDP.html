 buf = Encoding.Default.GetBytes(<span class="string">"Hello from UDP broadcast"</span>);  </span><br><span class="line">    Thread t = <span class="keyword">new</span> Thread(<span class="keyword">new</span> ThreadStart(RecvThread));  </span><br><span class="line">    t.IsBackground = <span class="literal">true</span>;  </span><br><span class="line">    t.Start();  </span><br><span class="line">    <span class="keyword">while</span> (<span class="literal">true</span>)  </span><br><span class="line">    &#123;  </span><br><span class="line">        client.Send(buf, buf.Length, endpoint);  </span><br><span class="line">        Thread.Sleep(<span class="number">1000</span>);  </span><br><span class="line">    &#125;  </span><br><span class="line">&#125;  </span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">RecvThread</span>(<span class="params"></span>)  </span></span><br><span class="line"><span class="function"></span>&#123;  </span><br><span class="line">    UdpClient client = <span class="keyword">new</span> UdpClient(<span class="keyword">new</span> IPEndPoint(IPAddress.Any, <span class="number">7788</span>));  </span><br><span class="line">    IPEndPoint endpoint = <span class="keyword">new</span> IPEndPoint(IPAddress.Any, <span class="number">0</span>);  </span><br><span class="line">    <span class="keyword">while</span> (<span class="literal">true</span>)  </span><br><span class="line">    &#123;  </span><br><span class="line">        <span class="keyword">byte</span>[] buf = client.Receive(<span class="keyword">ref</span> endpoint);  </span><br><span class="line">        <span class="keyword">string</span> msg = Encoding.Default.GetString(buf);  </span><br><span class="line">        Console.WriteLine(msg);  </span><br><span class="line">    &#125;  </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

lass="keyword">string</span> msg</span>)</span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    UdpClient udpClient = <span class="keyword">new</span> UdpClient();</span><br><span class="line">    IPEndPoint ipEndPoint = <span class="keyword">new</span> IPEndPoint(IPAddress.Broadcast, <span class="number">10249</span>);</span><br><span class="line">    <span class="comment">// IPAddress.Broadcast 就是 255.255.255.255</span></span><br><span class="line">    <span class="keyword">byte</span>[] buffer = Encoding.UTF8.GetBytes(msg);</span><br><span class="line">    udpClient.Send(buffer, buffer.Length, ipEndPoint);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">Main</span>(<span class="params"></span>)</span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    UdpClient udpServer = <span class="keyword">new</span> UdpClient(<span class="number">10249</span>);</span><br><span class="line">    IPEndPoint ipEndPoint = <span class="keyword">new</span> IPEndPoint(IPAddress.Any, <span class="number">10249</span>);</span><br><span class="line"></span><br><span class="line">    udpServer.BeginReceive(Received, udpServer);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment"><span class="doctag">///</span> <span class="doctag">&lt;summary&gt;</span></span></span><br><span class="line"><span class="comment"><span class="doctag">///</span> 异步接收UDP数据</span></span><br><span class="line"><span class="comment"><span class="doctag">///</span> <span class="doctag">&lt;/summary&gt;</span></span></span><br><span class="line"><span class="comment"><span class="doctag">///</span> <span class="doctag">&lt;param name="iar"&gt;</span><span class="doctag">&lt;/param&gt;</span></span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">Received</span>(<span class="params">IAsyncResult iar</span>)</span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">　　udpServer = iar.AsyncState <span class="keyword">as</span> UdpClient;</span><br><span class="line">　　<span class="keyword">byte</span>[] buffer = udpServer.EndReceive(iar, <span class="keyword">ref</span> ipEndPoint);</span><br><span class="line"></span><br><span class="line">　　<span class="comment">//将获取的byte[]数据转换成字符串</span></span><br><span class="line">　　<span class="keyword">string</span> m = Encoding.UTF8.GetString(buffer).Trim();</span><br><span class="line"></span><br><span class="line">　　Console.WriteLine(<span class="string">"Receive:&#123;0&#125;"</span>,m);</span><br><span class="line"></span><br><span class="line">　　<span class="comment">//继续异步接收数据</span></span><br><span class="line">　　udpServer.BeginReceive(Received, udpServer);</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
